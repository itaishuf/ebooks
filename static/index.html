<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itai Books</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg: #efe0c8;
      --bg-warm: #f7eddc;
      --surface: #ead9c2;
      --surface-strong: #f3e5d1;
      --border: #d4bda3;
      --border-light: #e4d2bc;
      --text: #2f241b;
      --text-dim: #6d5a49;
      --text-light: #9b846c;
      --accent: #c56a2a;
      --accent-hover: #df8c41;
      --accent-light: rgba(197, 106, 42, 0.16);
      --success: #556b3c;
      --success-light: rgba(85, 107, 60, 0.14);
      --secondary: #7a92b1;
      --secondary-light: rgba(122, 146, 177, 0.16);
      --error: #b5473a;
      --error-light: rgba(181, 71, 58, 0.12);
      --umber: #4f311f;
      --radius: 18px;
      --radius-sm: 14px;
      --shadow: 0 16px 34px rgba(79, 49, 31, 0.12);
      --shadow-lg: 0 28px 62px rgba(79, 49, 31, 0.18);
      --sidebar-w: 352px;
      --font-heading: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Lora', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 14% 18%, rgba(197, 106, 42, 0.09) 0%, transparent 48%),
        radial-gradient(ellipse at 80% 10%, rgba(122, 146, 177, 0.08) 0%, transparent 44%),
        radial-gradient(ellipse at 55% 92%, rgba(85, 107, 60, 0.06) 0%, transparent 42%),
        linear-gradient(180deg, rgba(255, 250, 242, 0.22), rgba(79, 49, 31, 0.03));
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.28), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(255, 255, 255, 0.16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(79, 49, 31, 0.08), transparent 34%);
      opacity: 0.9;
      z-index: 0;
    }

    body::after {
      background-image:
        linear-gradient(rgba(79, 49, 31, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 49, 31, 0.03) 1px, transparent 1px);
      background-size: 14px 14px;
      opacity: 0.26;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100dvh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100dvh;
      width: var(--sidebar-w);
      padding: 2.85rem 2rem 2.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.65rem;
      background: linear-gradient(180deg, rgba(247, 237, 220, 0.94) 0%, rgba(234, 217, 194, 0.96) 100%);
      border-right: 1px solid rgba(212, 189, 163, 0.85);
      box-shadow: 10px 0 34px rgba(79, 49, 31, 0.08);
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: linear-gradient(180deg, rgba(224, 138, 59, 0.16), rgba(197, 106, 42, 0.95), rgba(91, 107, 60, 0.24));
    }

    .sidebar-header {
      text-align: left;
      padding-bottom: 0.65rem;
    }

    .sidebar-header h1 {
      font-family: var(--font-heading);
      font-size: 2.6rem;
      font-style: italic;
      font-weight: 600;
      line-height: 0.92;
      color: var(--umber);
      letter-spacing: 0.01em;
    }

    .brush-divider {
      position: relative;
      height: 3px;
      border: none;
      border-radius: 999px;
      margin: 0.95rem 0 0;
      width: 100%;
      background: linear-gradient(90deg,
        rgba(197, 106, 42, 0.85) 0%,
        rgba(224, 138, 59, 0.72) 30%,
        rgba(110, 134, 166, 0.3) 70%,
        rgba(85, 107, 60, 0.22) 100%
      );
    }

    .brush-divider::after {
      content: '';
      position: absolute;
      left: 0;
      right: 12%;
      top: 7px;
      height: 1px;
      background: linear-gradient(90deg, rgba(79, 49, 31, 0.2), rgba(79, 49, 31, 0));
    }

    .sidebar-fields {
      display: flex;
      flex-direction: column;
      gap: 1.35rem;
      flex: 1;
    }

    .field {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-bottom: 0.4rem;
    }

    .field::after {
      content: '';
      position: absolute;
      left: 0;
      right: 40%;
      bottom: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(197, 106, 42, 0.85), rgba(224, 138, 59, 0.1));
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.28s ease;
    }

    .field:focus-within::after {
      transform: scaleX(1);
    }

    .field label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    input[type="text"], input[type="email"] {
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(212, 189, 163, 0.82);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.92rem 1rem;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.48);
      transition: border-color 0.22s, box-shadow 0.22s, background 0.22s;
    }

    input::placeholder {
      color: var(--text-light);
      font-weight: 400;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 0 4px rgba(197, 106, 42, 0.12);
    }

    .field-error {
      color: var(--error);
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 0.15rem;
    }

    .auth-card {
      position: relative;
      overflow: hidden;
      padding: 1.45rem 1.45rem 1.55rem;
      border-radius: var(--radius);
      background:
        linear-gradient(160deg, rgba(249, 241, 230, 0.98), rgba(241, 225, 204, 0.92)),
        radial-gradient(circle at top right, rgba(122, 146, 177, 0.12), transparent 45%),
        repeating-linear-gradient(180deg, rgba(79, 49, 31, 0.045) 0 1px, transparent 1px 12px);
      border: 1px solid rgba(197, 106, 42, 0.24);
      box-shadow: 0 14px 34px rgba(79, 49, 31, 0.1);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      inset: auto -18% -44% auto;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(197, 106, 42, 0.16), transparent 65%);
      pointer-events: none;
    }

    .auth-card::after {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: calc(var(--radius) - 6px);
      pointer-events: none;
    }

    .auth-card-header {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1.1rem;
      position: relative;
      z-index: 1;
    }

    .auth-eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .auth-card-title {
      font-family: var(--font-heading);
      font-size: 1.72rem;
      color: var(--umber);
      line-height: 1.04;
    }

    .auth-card-copy {
      color: var(--text-dim);
      font-size: 0.96rem;
      line-height: 1.62;
    }

    .auth-user-chip {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.95rem;
      padding: 1rem 1.05rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(85, 107, 60, 0.14);
      position: relative;
      z-index: 1;
    }

    .auth-user-stack {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-width: 0;
      flex: 1;
    }

    .auth-user-avatar {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(197, 106, 42, 0.95), rgba(224, 138, 59, 0.75));
      color: #fff8f0;
      font-family: var(--font-heading);
      font-size: 1.15rem;
      font-style: italic;
      box-shadow: 0 10px 20px rgba(197, 106, 42, 0.18);
    }

    .auth-user-meta {
      min-width: 0;
      flex: 1;
      overflow: hidden;
    }

    .auth-user-label {
      display: block;
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-light);
      margin-bottom: 0.25rem;
    }

    .auth-user-email {
      display: block;
      color: var(--text);
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.58);
      color: var(--text-dim);
      border-radius: 999px;
      padding: 0.68rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(79, 49, 31, 0.08);
    }

    .auth-note,
    .auth-error {
      margin-top: 0.95rem;
      border-radius: var(--radius-sm);
      padding: 0.85rem 0.95rem;
      font-size: 0.86rem;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }

    .auth-note {
      color: var(--umber);
      background: rgba(122, 146, 177, 0.1);
      border: 1px solid rgba(122, 146, 177, 0.18);
    }

    .auth-error {
      color: var(--error);
      background: var(--error-light);
      border: 1px solid rgba(181, 71, 58, 0.16);
    }

    .auth-hint {
      color: var(--text-light);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .btn-primary {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: #fff6ed;
      border: none;
      border-radius: 999px;
      padding: 1rem 1.55rem;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 22px rgba(197, 106, 42, 0.28);
      transition: box-shadow 0.3s, transform 0.2s;
      margin-top: 0.25rem;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: -30% auto -30% -40%;
      width: 42%;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0));
      transform: translateX(-180%) skewX(-18deg);
      pointer-events: none;
    }

    .btn-primary:hover {
      box-shadow: 0 14px 28px rgba(197, 106, 42, 0.36);
      transform: translateY(-2px);
    }

    .btn-primary:hover::before {
      animation: shimmerSweep 1.1s ease;
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 3px 10px rgba(197, 106, 42, 0.16);
    }

    .btn-primary:disabled::before {
      display: none;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      background: rgba(255, 255, 255, 0.74);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.92rem 1.5rem;
      font-family: var(--font-body);
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 18px rgba(79, 49, 31, 0.08);
      transition: box-shadow 0.3s, transform 0.2s, background 0.2s;
      margin-top: 0.5rem;
      width: 100%;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 28px rgba(79, 49, 31, 0.14);
      transform: translateY(-1px);
    }

    .btn-google:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-google svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .content {
      padding: 3.35rem 3.25rem 3.25rem 4.1rem;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      min-width: 0;
      overflow: hidden;
    }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.1rem;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 0;
    }

    .welcome > * {
      opacity: 0;
      animation: fadeUp 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .welcome > *:nth-child(1) { animation-delay: 0.04s; }
    .welcome > *:nth-child(2) { animation-delay: 0.12s; }
    .welcome > *:nth-child(3) { animation-delay: 0.2s; }
    .welcome > *:nth-child(4) { animation-delay: 0.28s; }
    .welcome > *:nth-child(5) { animation-delay: 0.36s; }

    .welcome-kicker {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .welcome-icon {
      width: 108px;
      height: 108px;
      padding: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(197, 106, 42, 0.18), rgba(122, 146, 177, 0.18));
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      appearance: none;
      -webkit-appearance: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .welcome-icon svg {
      width: 46px;
      height: 46px;
      display: block;
      color: var(--accent);
      fill: currentColor;
    }

    .welcome-icon-button {
      line-height: 0;
      opacity: 1;
      background: linear-gradient(135deg, rgba(197, 106, 42, 0.18), rgba(122, 146, 177, 0.18));
      cursor: pointer;
      box-shadow: 0 18px 36px rgba(79, 49, 31, 0.14);
      animation: floatIcon 4s ease-in-out infinite;
    }

    .welcome-icon-button:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 24px 44px rgba(79, 49, 31, 0.18);
      background: linear-gradient(135deg, rgba(197, 106, 42, 0.24), rgba(122, 146, 177, 0.22));
    }

    .welcome-icon-button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(197, 106, 42, 0.16), 0 24px 40px rgba(79, 49, 31, 0.16);
    }

    .welcome h2 {
      font-family: var(--font-heading);
      font-size: 4.5rem;
      font-style: italic;
      font-weight: 600;
      color: var(--umber);
      line-height: 0.9;
      letter-spacing: -0.02em;
    }

    .welcome-rule {
      width: 180px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(197, 106, 42, 0), rgba(197, 106, 42, 0.95), rgba(110, 134, 166, 0.45), rgba(197, 106, 42, 0));
    }

    .welcome-copy {
      color: var(--text-dim);
      font-size: 1.08rem;
      max-width: 38rem;
      line-height: 1.85;
    }

    .mobile-sheet-hint {
      display: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .section-label {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--umber);
      margin-bottom: 1.35rem;
    }

    .carousel-section,
    .jobs-section {
      opacity: 0;
      animation: fadeUp 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .carousel-wrapper {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .carousel {
      display: flex;
      gap: 1.65rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding: 1rem 0.3rem 1.7rem;
      flex: 1;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .carousel::-webkit-scrollbar { display: none; }

    .carousel-arrow {
      background: rgba(247, 237, 220, 0.92);
      border: 1px solid var(--border);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--umber);
      font-size: 1.3rem;
      font-family: var(--font-body);
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(79, 49, 31, 0.1);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .carousel-arrow:hover {
      background: var(--bg-warm);
      box-shadow: 0 16px 28px rgba(79, 49, 31, 0.14);
      transform: scale(1.05);
    }

    .carousel-arrow:active {
      transform: scale(0.97);
    }

    .carousel-item {
      scroll-snap-align: start;
      flex-shrink: 0;
      width: 162px;
      height: 244px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: linear-gradient(135deg, #ead6bd, #d3c0a8);
      box-shadow:
        0 20px 38px rgba(79, 49, 31, 0.14),
        10px 0 0 rgba(143, 103, 74, 0.08);
      transition: transform 0.34s ease, box-shadow 0.34s ease;
      opacity: 0;
      animation: fadeUp 0.64s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .carousel-item::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 12px;
      background: linear-gradient(180deg, rgba(79, 49, 31, 0.18), rgba(79, 49, 31, 0.04));
      mix-blend-mode: multiply;
      z-index: 1;
    }

    .carousel-item:hover {
      transform: translateY(-10px) scale(1.025);
      box-shadow:
        0 28px 46px rgba(79, 49, 31, 0.2),
        12px 0 0 rgba(143, 103, 74, 0.1);
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .carousel-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(79, 49, 31, 0) 18%,
        rgba(79, 49, 31, 0.78) 68%,
        rgba(79, 49, 31, 0.96) 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem 0.95rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.34s ease, transform 0.34s ease;
    }

    .carousel-item:hover .carousel-overlay {
      opacity: 1;
      transform: translateY(0);
    }

    .overlay-title {
      font-family: var(--font-heading);
      font-size: 1.08rem;
      font-weight: 600;
      color: #fbf1e7;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .overlay-author {
      font-size: 0.78rem;
      color: rgba(251, 241, 231, 0.78);
      margin-top: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .overlay-action {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.7rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #f1b274;
    }

    .overlay-action::after {
      content: '→';
      transform: translateX(-5px);
      transition: transform 0.26s ease;
    }

    .carousel-item:hover .overlay-action::after {
      transform: translateX(0);
    }

    .jobs-section {
      max-width: 680px;
    }

    .jobs-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .job-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(247, 237, 220, 0.9), rgba(234, 217, 194, 0.98));
      border: 1px solid var(--border-light);
      border-radius: 22px;
      padding: 1.45rem 1.45rem 1.35rem;
      box-shadow: var(--shadow);
    }

    .job-card::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, rgba(224, 138, 59, 0.2), rgba(197, 106, 42, 0.95), rgba(224, 138, 59, 0.28));
    }

    .job-card.error-state::before {
      background: linear-gradient(180deg, rgba(181, 71, 58, 0.24), rgba(181, 71, 58, 0.95), rgba(181, 71, 58, 0.3));
    }

    .job-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.9rem;
      margin-bottom: 1rem;
    }

    .job-book-meta {
      min-width: 0;
    }

    .job-book-title {
      font-family: var(--font-heading);
      font-size: 1.42rem;
      font-weight: 600;
      line-height: 1.05;
      color: var(--umber);
    }

    .job-book-author {
      margin-top: 0.25rem;
      color: var(--text-dim);
      font-size: 0.88rem;
    }

    .job-status-pill {
      flex-shrink: 0;
      padding: 0.42rem 0.76rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(212, 189, 163, 0.72);
      color: var(--text-dim);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-steps {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.95rem;
      padding-left: 0.1rem;
    }

    .status-steps::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(180deg, rgba(197, 106, 42, 0.22), rgba(79, 49, 31, 0.14));
    }

    .step {
      position: relative;
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: start;
      gap: 0.9rem;
      font-size: 0.94rem;
      color: var(--text-light);
      transition: color 0.28s ease;
    }

    .step.active {
      color: var(--umber);
      font-weight: 600;
    }

    .step.done {
      color: var(--success);
      font-weight: 600;
    }

    .step-node {
      position: relative;
      z-index: 1;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(212, 189, 163, 0.92);
      background: rgba(255, 248, 240, 0.92);
      box-shadow: 0 0 0 5px rgba(247, 237, 220, 0.74);
    }

    .step-pending-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--border);
    }

    .step.done .step-node {
      border-color: rgba(197, 106, 42, 0.68);
      background: linear-gradient(135deg, rgba(197, 106, 42, 0.95), rgba(224, 138, 59, 0.84));
      box-shadow: 0 0 0 5px rgba(197, 106, 42, 0.12);
    }

    .step.active .step-node {
      border-color: rgba(197, 106, 42, 0.72);
      background: rgba(255, 250, 244, 0.96);
      box-shadow: 0 0 0 5px rgba(197, 106, 42, 0.12);
      animation: pulseNode 1.5s ease-in-out infinite;
    }

    .step-copy {
      padding-top: 0.1rem;
      line-height: 1.45;
    }

    .step-check {
      color: #fff8f0;
      font-size: 0.8rem;
      line-height: 1;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.78s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .search-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      height: 100%;
      min-height: 60dvh;
    }

    .search-loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .search-loading-label {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      color: var(--text-dim);
      letter-spacing: 0.01em;
    }

    .error-msg {
      color: var(--error);
      font-size: 0.86rem;
      font-weight: 500;
      margin-top: 1rem;
      padding: 0.8rem 0.95rem;
      background: rgba(181, 71, 58, 0.08);
      border-left: 3px solid rgba(181, 71, 58, 0.9);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .error-msg p + p {
      margin-top: 0.65rem;
    }

    .btn-retry-search {
      margin-top: 0.9rem;
      padding: 0.58rem 1rem;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--secondary);
      background: var(--secondary-light);
      border: 1px solid rgba(122, 146, 177, 0.3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .btn-retry-search:hover {
      background: rgba(122, 146, 177, 0.22);
      border-color: rgba(122, 146, 177, 0.42);
      transform: translateY(-1px);
    }

    .error-link {
      color: var(--umber);
      font-weight: 600;
      word-break: break-word;
    }

    .error-link:hover {
      color: var(--accent);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(79, 49, 31, 0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-card {
      background: linear-gradient(180deg, rgba(247, 237, 220, 0.98) 0%, rgba(234, 217, 194, 0.98) 100%);
      border: 1px solid rgba(212, 189, 163, 0.88);
      border-radius: 24px;
      padding: 1.7rem;
      max-width: 460px;
      width: min(92vw, 460px);
      box-shadow: var(--shadow-lg);
      text-align: left;
      animation: modalPop 0.28s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .modal-card h3 {
      font-family: var(--font-heading);
      font-size: 1.7rem;
      font-weight: 600;
      color: var(--umber);
      line-height: 1;
    }

    .modal-card-body {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      margin: 1.15rem 0 1.5rem;
    }

    .modal-cover {
      width: 88px;
      height: 126px;
      flex-shrink: 0;
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(135deg, #ead6bd, #d3c0a8);
      box-shadow: 0 18px 28px rgba(79, 49, 31, 0.16);
    }

    .modal-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-cover-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-size: 1.2rem;
      color: var(--umber);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(79, 49, 31, 0.03));
    }

    .modal-book-meta {
      min-width: 0;
      flex: 1;
      align-self: center;
    }

    .modal-book-title {
      font-family: var(--font-heading);
      font-weight: 600;
      color: var(--umber);
      font-size: 1.45rem;
      line-height: 1.05;
      margin-bottom: 0.35rem;
    }

    .modal-book-author {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 0.72rem 1.45rem;
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .btn-confirm {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: #fff6ed;
      border: none;
      box-shadow: 0 8px 18px rgba(197, 106, 42, 0.26);
    }

    .btn-confirm:hover {
      box-shadow: 0 12px 22px rgba(197, 106, 42, 0.34);
      transform: translateY(-1px);
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.44);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
    }

    .mobile-launcher {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 1.1rem;
      transform: translateX(-50%);
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: none;
      padding: 0;
      line-height: 0;
      z-index: 1001;
    }

    .mobile-launcher-button {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(247, 237, 220, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      width: 66px;
      height: 66px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(79, 49, 31, 0.14);
      transition: box-shadow 0.2s, transform 0.2s, background 0.2s;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mobile-launcher-button:hover {
      background: var(--bg-warm);
      box-shadow: 0 18px 30px rgba(79, 49, 31, 0.18);
      transform: translateY(-2px);
    }

    .mobile-launcher-button svg {
      width: 28px;
      height: 28px;
      display: block;
      color: var(--accent);
      fill: currentColor;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(79, 49, 31, 0.28);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 99;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulseNode {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 5px rgba(197, 106, 42, 0.12); }
      50% { transform: scale(1.12); box-shadow: 0 0 0 9px rgba(197, 106, 42, 0.08); }
    }

    @keyframes shimmerSweep {
      from { transform: translateX(-180%) skewX(-18deg); }
      to { transform: translateX(380%) skewX(-18deg); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
      }

      .mobile-launcher {
        display: flex;
      }

      .sidebar {
        position: fixed;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: auto;
        height: auto;
        max-height: min(78dvh, 600px);
        padding: 1.2rem 1rem calc(1.35rem + env(safe-area-inset-bottom));
        border-right: none;
        border-top: 1px solid var(--border);
        border-top-left-radius: 28px;
        border-top-right-radius: 28px;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.35s ease;
        box-shadow: 0 -20px 40px rgba(79, 49, 31, 0.05);
        z-index: 1002;
      }

      .sidebar::before {
        inset: 0 0 auto 0;
        width: auto;
        height: 3px;
      }

      .sidebar.open {
        transform: translateY(0);
        box-shadow: 0 -24px 46px rgba(79, 49, 31, 0.18);
      }

      .sidebar-overlay.visible {
        display: block;
      }

      .sidebar-header {
        padding-top: 0.25rem;
      }

      .sidebar-header::before {
        content: '';
        display: block;
        width: 52px;
        height: 5px;
        border-radius: 999px;
        margin: 0 auto 1rem;
        background: rgba(79, 49, 31, 0.16);
      }

      .sidebar-fields {
        gap: 1rem;
      }

      .content {
        padding: 2.25rem 1.25rem 6.25rem;
      }

      .welcome {
        gap: 1rem;
      }

      .welcome-icon {
        width: 96px;
        height: 96px;
      }

      .welcome h2 {
        font-size: 3.2rem;
      }

      .welcome-copy {
        font-size: 1rem;
        max-width: 30rem;
      }

      .auth-user-chip {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .btn-secondary {
        width: 100%;
        justify-content: center;
      }

      .mobile-sheet-hint {
        display: block;
      }

      .carousel-wrapper {
        gap: 0.5rem;
      }

      .carousel-arrow {
        width: 38px;
        height: 38px;
        font-size: 1.1rem;
      }

      .carousel-item {
        width: 136px;
        height: 204px;
      }

      .jobs-section {
        max-width: 100%;
      }

      .job-card-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .modal-card-body {
        gap: 0.85rem;
      }
    }

    @media (max-width: 480px) {
      .carousel-arrow {
        display: none;
      }

      .content {
        padding: 1.5rem 1rem 6rem;
      }

      .sidebar {
        max-height: min(84dvh, 620px);
      }

      .sidebar-header h1 {
        font-size: 2.2rem;
      }

      .welcome h2 {
        font-size: 2.7rem;
      }

      .welcome-copy {
        font-size: 0.98rem;
      }

      .welcome-icon {
        width: 92px;
        height: 92px;
      }

      .carousel-item {
        width: 124px;
        height: 186px;
      }

      .modal-card {
        padding: 1.35rem;
      }

      .modal-card-body {
        flex-direction: column;
      }

      .modal-cover {
        width: 78px;
        height: 112px;
      }

      .modal-actions {
        justify-content: flex-start;
      }

      .modal-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app" x-data="ebookarr()" x-init="init()">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay"
         :class="{ 'visible': sidebarOpen }"
         @click="closeSearchPanel()"
         x-show="sidebarOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         style="display: none;"></div>

    <!-- Left Sidebar -->
    <aside id="mobile-search-panel" class="sidebar" :class="{ 'open': sidebarOpen }">
      <div class="sidebar-header">
        <h1>Ebookarr</h1>
        <hr class="brush-divider">
      </div>

      <div class="sidebar-fields">
        <div class="auth-card">
          <template x-if="isSignedIn()">
            <div>
              <div class="auth-card-header">
                <span class="auth-eyebrow">Reading Passport</span>
                <h2 class="auth-card-title">Signed in</h2>
                <p class="auth-card-copy">Your signed session stays in this browser, so search and downloads remain tied to your account.</p>
              </div>
              <div class="auth-user-chip">
                <div class="auth-user-stack">
                  <span class="auth-user-avatar" x-text="userInitial()"></span>
                  <div class="auth-user-meta">
                    <span class="auth-user-label">Authenticated as</span>
                    <span class="auth-user-email" x-text="currentUser?.email || ''"></span>
                  </div>
                </div>
                <button class="btn-secondary" type="button" @click="signOut()">Sign out</button>
              </div>
              <p x-show="authMessage" x-text="authMessage" class="auth-note"></p>
              <p x-show="authError" x-text="authError" class="auth-error"></p>
            </div>
          </template>

          <template x-if="!isSignedIn()">
            <div>
              <div class="auth-card-header">
                <span class="auth-eyebrow">Reader Access</span>
                <h2 class="auth-card-title">Sign in to browse</h2>
                <p class="auth-card-copy">Use your Google account to start a secure session here. New readers are set up automatically.</p>
              </div>

              <button class="btn-google"
                      type="button"
                      @click="signInWithGoogle()"
                      :disabled="isAuthBusy()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span x-text="authButtonLabel()"></span>
              </button>

              <p class="auth-hint"
                 x-show="authState === 'session_boot' || authState === 'signing_in'"
                 x-text="authState === 'signing_in' ? 'Opening Google sign-in…' : 'Restoring your last session…'">
              </p>
              <p x-show="authMessage" x-text="authMessage" class="auth-note"></p>
              <p x-show="authError" x-text="authError" class="auth-error"></p>
            </div>
          </template>
        </div>

        <div class="field">
          <label for="query">Book name or Goodreads URL</label>
          <input id="query" type="text" x-model="query"
                 placeholder="The Great Gatsby"
                 @keydown.enter="submit()"
                 :disabled="searching || !canUseProtectedActions()">
        </div>

        <div class="field">
          <label for="email">Kindle email</label>
          <input id="email" type="email" x-model="kindleMail"
                 placeholder="you@kindle.com"
                 @change="localStorage.setItem('kindle_mail', kindleMail)"
                 :disabled="!canUseProtectedActions()">
        </div>

        <button class="btn-primary"
                @click="submit(); closeSearchPanel()"
                :disabled="!query.trim() || !kindleMail || searching || !canUseProtectedActions()">
          <span x-text="searchButtonLabel()"></span>
        </button>
        <p class="auth-hint" x-show="!isSignedIn()">Sign in with Google first to search, start downloads, and track your jobs.</p>
      </div>
    </aside>

    <!-- Center Content -->
    <main class="content">

      <!-- Loading state while searching -->
      <template x-if="searching && searchResults.length === 0 && activeJobs.length === 0">
        <div class="search-loading">
          <div class="search-loading-spinner"></div>
          <p class="search-loading-label">Searching…</p>
        </div>
      </template>

      <!-- Welcome state -->
      <template x-if="searchResults.length === 0 && activeJobs.length === 0 && !searching">
        <div class="welcome">
          <p class="welcome-kicker">Your private library desk</p>
          <button type="button"
                  class="welcome-icon welcome-icon-button"
                  @click="openSearchPanel()"
                  aria-label="Open search inputs">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.75 3.5A3.25 3.25 0 0 0 3.5 6.75v10.5a3.25 3.25 0 0 0 3.25 3.25H20.5V3.5H6.75Zm1.1 2h8.9v13h-8a1.85 1.85 0 0 0-1.25.48V6.75c0-.7.56-1.25 1.25-1.25Z"/>
              <path d="M10.35 8.2a.85.85 0 0 1 .85-.85h1.6a.85.85 0 1 1 0 1.7h-1.6a.85.85 0 0 1-.85-.85Zm0 3.15a.85.85 0 0 1 .85-.85h3.2a.85.85 0 1 1 0 1.7h-3.2a.85.85 0 0 1-.85-.85Zm0 3.15a.85.85 0 0 1 .85-.85h3.2a.85.85 0 1 1 0 1.7h-3.2a.85.85 0 0 1-.85-.85Z"/>
            </svg>
          </button>
          <h2>Find your<br>next book</h2>
          <div class="welcome-rule"></div>
          <p class="welcome-copy" x-text="isSignedIn() ? 'Search by title or paste a Goodreads URL to discover and send beautifully packaged ebooks to your Kindle.' : 'Sign in with Google, then search by title or paste a Goodreads URL to send beautifully packaged ebooks to your Kindle.'"></p>
          <p class="mobile-sheet-hint">Tap the book to open the search fields</p>
        </div>
      </template>

      <!-- Carousel: search results -->
      <template x-if="searchResults.length > 0">
        <div class="carousel-section">
          <p class="section-label" x-text="searchResults.length + ' books found'"></p>
          <div class="carousel-wrapper">
            <button class="carousel-arrow"
                    @click="scrollCarousel(-1)"
                    aria-label="Scroll left">&lsaquo;</button>
            <div class="carousel">
              <template x-for="(r, index) in searchResults" :key="r.goodreads_url">
                <div class="carousel-item"
                     :style="'animation-delay:' + (index * 0.07) + 's'"
                     @click="confirmBook = r">
                  <img :src="r.cover_url" :alt="r.title"
                       onerror="this.style.display='none'">
                  <div class="carousel-overlay">
                    <div class="overlay-title" x-text="r.title"></div>
                    <div class="overlay-author" x-text="r.author"></div>
                    <div class="overlay-action">Send to Kindle</div>
                  </div>
                </div>
              </template>
            </div>
            <button class="carousel-arrow"
                    @click="scrollCarousel(1)"
                    aria-label="Scroll right">&rsaquo;</button>
          </div>
        </div>
      </template>

      <!-- Active jobs (replaces carousel) -->
      <template x-if="activeJobs.length > 0 && searchResults.length === 0">
        <div class="jobs-section">
          <p class="section-label">Active requests</p>
          <div class="jobs-list">
            <template x-for="job in activeJobs" :key="job.id">
              <div class="job-card" :class="{ 'error-state': job.status === 'error' }">
                <div class="job-card-head">
                  <div class="job-book-meta">
                    <p class="job-book-title" x-text="job.title || 'Processing request'"></p>
                    <p class="job-book-author" x-show="job.author" x-text="job.author"></p>
                  </div>
                  <span class="job-status-pill" x-text="statusLabel(job.status)"></span>
                </div>
                <div class="status-steps">
                  <template x-for="s in steps" :key="s.key">
                    <div class="step"
                         :class="{
                           'active': isStepActive(job.status, s.key),
                           'done': isStepDone(job.status, s.key)
                         }">
                      <span class="step-node">
                        <template x-if="isStepDone(job.status, s.key)">
                          <span class="step-check">✓</span>
                        </template>
                        <template x-if="isStepActive(job.status, s.key)">
                          <span class="spinner"></span>
                        </template>
                        <template x-if="!isStepDone(job.status, s.key) && !isStepActive(job.status, s.key)">
                          <span class="step-pending-dot"></span>
                        </template>
                      </span>
                      <span class="step-copy" x-text="s.label"></span>
                    </div>
                  </template>
                </div>
                <template x-if="job.status === 'error'">
                  <div class="error-msg">
                    <p x-text="job.error"></p>
                    <template x-if="job.fallback">
                      <p>
                        <span x-text="job.fallback.message"></span>
                        <a class="error-link"
                           :href="job.fallback.url"
                           target="_blank"
                           rel="noopener noreferrer">
                          Open LibGen download page
                        </a>
                      </p>
                    </template>
                  </div>
                </template>
                <template x-if="job.status === 'error' && job.savedResults && job.savedResults.length > 0">
                  <button class="btn-retry-search" @click="restoreSearch(job)">
                    Try a different version
                  </button>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>

    </main>

    <button type="button"
            class="mobile-launcher"
            x-show="searchResults.length > 0 || activeJobs.length > 0 || sidebarOpen"
            x-transition.opacity
            @click="toggleSearchPanel()"
            :aria-expanded="sidebarOpen.toString()"
            aria-controls="mobile-search-panel"
            aria-label="Open search inputs"
            style="display: none;">
      <span class="mobile-launcher-button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6.75 3.5A3.25 3.25 0 0 0 3.5 6.75v10.5a3.25 3.25 0 0 0 3.25 3.25H20.5V3.5H6.75Zm1.1 2h8.9v13h-8a1.85 1.85 0 0 0-1.25.48V6.75c0-.7.56-1.25 1.25-1.25Z"/>
          <path d="M10.35 8.2a.85.85 0 0 1 .85-.85h1.6a.85.85 0 1 1 0 1.7h-1.6a.85.85 0 0 1-.85-.85Zm0 3.15a.85.85 0 0 1 .85-.85h3.2a.85.85 0 1 1 0 1.7h-3.2a.85.85 0 0 1-.85-.85Zm0 3.15a.85.85 0 0 1 .85-.85h3.2a.85.85 0 1 1 0 1.7h-3.2a.85.85 0 0 1-.85-.85Z"/>
        </svg>
      </span>
    </button>

    <!-- Confirmation modal -->
    <template x-if="confirmBook">
      <div class="modal-backdrop" @click.self="confirmBook = null">
        <div class="modal-card">
          <h3>Send to Kindle?</h3>
          <div class="modal-card-body">
            <div class="modal-cover">
              <template x-if="confirmBook.cover_url">
                <img :src="confirmBook.cover_url" :alt="confirmBook.title">
              </template>
              <template x-if="!confirmBook.cover_url">
                <div class="modal-cover-fallback">Book</div>
              </template>
            </div>
            <div class="modal-book-meta">
              <p class="modal-book-title" x-text="confirmBook.title"></p>
              <p class="modal-book-author" x-text="confirmBook.author"></p>
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" @click="confirmBook = null">No</button>
            <button class="btn-confirm" @click="downloadFromSearch(confirmBook); confirmBook = null">Yes</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <script>
    async function parseError(res) {
      try {
        const data = await res.json();
        return data.detail || res.statusText;
      } catch {
        return await res.text() || res.statusText;
      }
    }

    function removeAuthFeedbackFromUrl() {
      const url = new URL(window.location.href);
      const authParams = ['auth_error'];
      let changed = false;

      for (const key of authParams) {
        if (url.searchParams.has(key)) {
          url.searchParams.delete(key);
          changed = true;
        }
      }

      if (changed) {
        const next = `${url.pathname}${url.search}${url.hash}`;
        window.history.replaceState({}, document.title, next);
      }
    }

    function readAuthFeedbackFromUrl() {
      const url = new URL(window.location.href);
      return url.searchParams.get('auth_error') || '';
    }

    function ebookarr() {
      return {
        query: '',
        kindleMail: localStorage.getItem('kindle_mail') || '',
        authState: 'session_boot',
        authError: '',
        authMessage: '',
        currentUser: null,
        searching: false,
        searchResults: [],
        activeJobs: [],
        sidebarOpen: false,
        confirmBook: null,
        steps: [
          { key: 'queued', label: 'Queued' },
          { key: 'fetching_isbn', label: 'Fetching ISBN' },
          { key: 'searching', label: 'Searching for book' },
          { key: 'downloading', label: 'Downloading' },
          { key: 'sending', label: 'Sending to Kindle' },
          { key: 'done', label: 'Done' },
        ],

        stepIndex(key) {
          const idx = this.steps.findIndex(s => s.key === key);
          return idx === -1 ? -1 : idx;
        },

        isStepDone(jobStatus, stepKey) {
          return this.stepIndex(jobStatus) > this.stepIndex(stepKey) || (jobStatus === 'done' && stepKey === 'done');
        },

        isStepActive(jobStatus, stepKey) {
          return jobStatus === stepKey && jobStatus !== 'done' && jobStatus !== 'error';
        },

        statusLabel(key) {
          if (key === 'error') return 'Needs attention';
          const step = this.steps.find(s => s.key === key);
          return step ? step.label : 'Working';
        },

        async init() {
          await this.initializeAuth();
        },

        isAuthBusy() {
          return this.authState === 'session_boot' || this.authState === 'signing_in';
        },

        isSignedIn() {
          return this.authState === 'signed_in' && !!this.currentUser;
        },

        userInitial() {
          return (this.currentUser?.email || 'R').trim().charAt(0).toUpperCase() || 'R';
        },

        canUseProtectedActions() {
          return this.isSignedIn();
        },

        authButtonLabel() {
          if (this.authState === 'session_boot') return 'Preparing sign-in...';
          if (this.authState === 'signing_in') return 'Signing you in...';
          return 'Continue with Google';
        },

        searchButtonLabel() {
          if (this.searching) return 'Searching…';
          if (this.authState === 'session_boot' || this.authState === 'signing_in') return 'Checking session...';
          if (!this.isSignedIn()) return 'Sign in to search';
          return 'Search Book';
        },

        isGoodreadsUrl(text) {
          return /goodreads\.com/.test(text);
        },

        scrollCarousel(dir) {
          const el = document.querySelector('.carousel');
          if (el) el.scrollBy({ left: dir * 200, behavior: 'smooth' });
        },

        openSearchPanel() {
          this.sidebarOpen = true;
          const focusTarget = 'query';
          this.$nextTick(() => document.getElementById(focusTarget)?.focus());
        },

        closeSearchPanel() {
          this.sidebarOpen = false;
        },

        toggleSearchPanel() {
          if (this.sidebarOpen) {
            this.closeSearchPanel();
          } else {
            this.openSearchPanel();
          }
        },

        async initializeAuth() {
          this.authState = 'session_boot';
          this.authError = '';
          this.authMessage = '';
          const authFeedback = readAuthFeedbackFromUrl();

          try {
            const res = await fetch('/auth/session', { credentials: 'same-origin' });
            if (!res.ok) throw new Error(await parseError(res));
            const data = await res.json();
            this.applySession(data.authenticated ? data.user : null);
            if (!data.authenticated && authFeedback) {
              this.authError = authFeedback;
            }
          } catch (e) {
            this.authState = 'signed_out';
            this.authError = e?.message || 'Unable to initialize authentication.';
          } finally {
            if (authFeedback) removeAuthFeedbackFromUrl();
          }
        },

        applySession(user) {
          if (!user) {
            this.currentUser = null;
            this.authState = 'signed_out';
            return;
          }

          this.currentUser = {
            id: user.id,
            email: user.email || '',
            name: user.name || '',
          };
          this.authState = 'signed_in';
          this.authError = '';
          this.authMessage = '';
          if (!this.kindleMail) {
            this.kindleMail = this.currentUser.email;
          }
        },

        async signInWithGoogle() {
          if (this.isAuthBusy()) return;
          this.authState = 'signing_in';
          this.authError = '';
          this.authMessage = '';
          window.location.assign('/auth/google/login');
        },

        async signOut() {
          this.authError = '';
          this.authMessage = '';

          try {
            const res = await fetch('/auth/logout', {
              method: 'POST',
              credentials: 'same-origin',
            });
            if (!res.ok) throw new Error(await parseError(res));
            this.handleSignedOut('Signed out.');
          } catch (e) {
            this.authError = e?.message || 'Unable to sign out cleanly.';
          }
        },

        handleSignedOut(message = '') {
          this.currentUser = null;
          this.authState = 'signed_out';
          this.searching = false;
          this.searchResults = [];
          this.activeJobs = [];
          this.confirmBook = null;
          this.authMessage = message;
        },

        async authFetch(url, options = {}) {
          const headers = new Headers(options.headers || {});
          if (options.body && !headers.has('Content-Type')) {
            headers.set('Content-Type', 'application/json');
          }

          const res = await fetch(url, {
            ...options,
            headers,
            credentials: 'same-origin',
          });
          if (res.status !== 401) return res;

          const detail = await parseError(res);
          this.handleSignedOut(detail || 'Your session expired. Sign in again.');
          throw new Error(detail || 'Authentication failed');
        },

        async submit() {
          if (!this.query.trim() || !this.kindleMail) return;
          if (!this.canUseProtectedActions()) {
            this.openSearchPanel();
            return;
          }

          this.authError = '';
          this.searchResults = [];
          this.activeJobs = this.activeJobs.filter(j => j.status !== 'error');

          if (this.isGoodreadsUrl(this.query)) {
            await this.downloadGoodreads();
          } else {
            await this.search();
          }
        },

        async search() {
          this.searching = true;
          try {
            const params = new URLSearchParams({ q: this.query.trim() });
            const res = await this.authFetch(`/search?${params}`);
            if (!res.ok) throw new Error(await parseError(res));
            const data = await res.json();
            this.searchResults = data.results;
          } catch (e) {
            this.activeJobs.unshift({ id: 'err-' + Date.now(), status: 'error', error: e?.message || 'Search failed.', fallback: null });
          } finally {
            this.searching = false;
          }
        },

        async downloadGoodreads() {
          this.searching = true;
          const requestedTitle = this.query.trim();
          try {
            const res = await this.authFetch('/download', {
              method: 'POST',
              body: JSON.stringify({
                goodreads_url: requestedTitle,
                kindle_mail: this.kindleMail,
              }),
            });
            if (!res.ok) throw new Error(await parseError(res));
            const { job_id } = await res.json();
            this.trackJob(job_id, [], {
              title: requestedTitle,
              author: '',
              coverUrl: '',
            });
            this.query = '';
          } catch (e) {
            this.activeJobs.unshift({
              id: 'err-' + Date.now(),
              status: 'error',
              error: e?.message || 'Download failed.',
              fallback: null,
              title: requestedTitle,
              author: '',
              coverUrl: '',
            });
          } finally {
            this.searching = false;
          }
        },

        async downloadFromSearch(result) {
          const savedResults = [...this.searchResults];
          try {
            const res = await this.authFetch('/download', {
              method: 'POST',
              body: JSON.stringify({
                goodreads_url: result.goodreads_url,
                kindle_mail: this.kindleMail,
              }),
            });
            if (!res.ok) throw new Error(await parseError(res));
            this.searchResults = [];
            const { job_id } = await res.json();
            this.trackJob(job_id, savedResults, {
              title: result.title || '',
              author: result.author || '',
              coverUrl: result.cover_url || '',
            });
          } catch (e) {
            this.activeJobs.unshift({
              id: 'err-' + Date.now(),
              status: 'error',
              error: e?.message || 'Download failed.',
              fallback: null,
              savedResults,
              title: result.title || '',
              author: result.author || '',
              coverUrl: result.cover_url || '',
            });
          }
        },

        trackJob(jobId, savedResults = [], meta = {}) {
          this.activeJobs.unshift({
            id: jobId,
            status: 'queued',
            error: null,
            fallback: null,
            savedResults,
            title: meta.title || '',
            author: meta.author || '',
            coverUrl: meta.coverUrl || '',
          });
          this.pollJob(this.activeJobs[0]);
        },

        restoreSearch(job) {
          this.searchResults = job.savedResults || [];
          this.activeJobs = this.activeJobs.filter(j => j.id !== job.id);
        },

        async pollJob(job) {
          while (job.status !== 'done' && job.status !== 'error') {
            await new Promise(r => setTimeout(r, 2000));
            try {
              const res = await this.authFetch(`/jobs/${job.id}`);
              if (!res.ok) break;
              const data = await res.json();
              job.status = data.status;
              job.error = data.error;
              job.fallback = data.fallback || null;
            } catch (e) {
              job.status = 'error';
              job.error = e?.message || 'Authentication failed';
              job.fallback = null;
              break;
            }
          }
        },
      };
    }
  </script>
</body>
</html>
