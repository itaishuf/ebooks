x-ebookarr-port: &ebookarr_port "19191"

networks:
  # Shared internal network so ebookarr (which runs in tailscale's network
  # namespace via network_mode: service:tailscale) can reach flaresolverr.
  internal:

services:
  tailscale:
    image: tailscale/tailscale:stable
    hostname: itai-books
    entrypoint: ["/bin/sh", "/config/bootstrap.sh"]
    env_file:
      - .tailscale.env
    environment:
      FUNNEL_TARGET_PORT: *ebookarr_port
      TS_AUTH_ONCE: "true"
      TS_HOSTNAME: itai-books
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    networks:
      - default
      - internal
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
    networks:
      - internal

  download-proxy:
    build:
      context: .
      dockerfile: Dockerfile.download-proxy
    restart: unless-stopped
    networks:
      - internal

  ebookarr:
    build:
      context: .
    depends_on:
      tailscale:
        condition: service_started
      flaresolverr:
        condition: service_started
      download-proxy:
        condition: service_started
    env_file:
      - .env
    environment:
      DOWNLOAD_DIR: /data/downloads
      LOG_PATH: /data/books.log
      PORT: *ebookarr_port
    volumes:
      - ebookarr-data:/data
    network_mode: service:tailscale
    restart: unless-stopped

volumes:
  tailscale-state:
  ebookarr-data:
